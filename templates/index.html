<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEAM Energy - Nominaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .btn-primary { background-color: #1a4da1; border: none; padding: 12px; font-weight: bold; }
        .btn-primary:hover { background-color: #153d81; }
        .header-logo { color: #1a4da1; font-weight: bold; }
        .timer-box { text-align: right; }
        #timer { color: #d9534f; font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <div class="row align-items-center mb-4">
                        <div class="col-6">
                            <h2 class="header-logo">GEAM Energy - Nominaciones</h2>
                        </div>
                        <div class="col-6 timer-box">
                            <small class="text-uppercase fw-bold">Cierre de ventana en:</small>
                            <div id="timer">00:00:00</div>
                        </div>
                    </div>

                    <form id="form-nominacion" class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Fecha de Aplicación</label>
                            <input type="date" id="fecha" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Contrato</label>
                            <select id="contrato" class="form-select" required>
                                <option value="">Seleccione un contrato...</option>
                                <option value="CONT-001 (Empresa Alpha)">CONT-001 (Empresa Alpha)</option>
                                <option value="CONT-002 (Empresa Beta)">CONT-002 (Empresa Beta)</option>
                                <option value="CONT-003 (Industria Gama)">CONT-003 (Industria Gama)</option>
                            </select>
                        </div>
                        <div class="col-md-12 mb-4">
                            <label class="form-label fw-bold">Cantidad (MBTU)</label>
                            <input type="number" id="cantidad" class="form-control" placeholder="Ej: 5000" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100 text-uppercase">Enviar Nominación</button>
                        </div>
                    </form>

                    <hr class="my-4">
                    
                    <div class="d-flex justify-content-between align-items-center">
                        <h5>Acciones Administrativas</h5>
                        <a href="/descargar" class="btn btn-outline-success">Descargar Reporte Excel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        // Establecer la fecha de hoy por defecto al cargar
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('fecha').value = today;
        });
    </script>
</body>
</html>
